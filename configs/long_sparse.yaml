# Matrix arm: sparse reward (+1/-1), 1M steps.
# Tests whether longer training alone moves HP-retention when there is no HP
# signal in the reward. Expected flat (it can't optimize what it isn't told).
# Run at seeds 0,1,2 via `--seed` for mean+-std.
run_name: long-sparse
wandb_project: mini-spire
seed: 0

n_envs: 8
hp_reward_coeff: 0.0

total_timesteps: 1000000
learning_rate: 0.0003
n_steps: 2048
batch_size: 64
n_epochs: 10
gamma: 0.99

save_freq: 250000
